<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lincle</title>
    <style>
        :root { --bg-body: #f3f4f6; --bg-card: #ffffff; --text-main: #1f2937; --text-muted: #6b7280; --border: #e5e7eb; --primary: #2563eb; --primary-hover: #1d4ed8; --success: #059669; --danger: #dc2626; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        [data-theme="dark"] { --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; --primary: #3b82f6; --primary-hover: #60a5fa; --success: #10b981; --danger: #ef4444; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4); }
        body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; transition: background-color 0.3s ease, color 0.3s ease; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .btn-theme { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 4px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-theme:hover { background-color: var(--border); }
        .card { background-color: var(--bg-card); border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .toggle-container { display: flex; justify-content: space-between; align-items: center; }
        .toggle-label { font-size: 14px; font-weight: 600; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;}
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-primary { background-color: var(--primary); color: #ffffff; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); margin-bottom: 0; }
        .btn-secondary:hover { background-color: var(--border); }
        .status-msg { text-align: center; font-size: 11px; font-weight: 600; margin-bottom: 10px; display: none; padding: 0 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Lincle</h1>
        <button id="themeToggle" class="btn-theme" data-i18n="themeDark">Koyu Mod</button>
    </div>
    
    <div class="card toggle-container">
        <span class="toggle-label" data-i18n="popShield">Koruma Kalkanı</span>
        <label class="switch"><input type="checkbox" id="masterToggle" checked><span class="slider"></span></label>
    </div>
    
    <div class="card stats-grid" id="statsContainer">
        <div>
            <div class="stat-value" id="valLinks">--</div>
            <div class="stat-label" data-i18n="popCleaned">Temizlenen</div>
        </div>
        <div>
            <div class="stat-value" id="valTime">--</div>
            <div class="stat-label" data-i18n="popSaved">Tasarruf</div>
        </div>
    </div>
    
    <button id="btnCleanClipboard" class="btn btn-primary" data-i18n="btnCleanClip">Panodaki Bağlantıyı Temizle</button>
    <div id="clipboardStatus" class="status-msg"></div>
    
    <button id="btnOpenSettings" class="btn btn-secondary" data-i18n="btnAdvSet">Gelişmiş Ayarlar</button>

    <script src="i18n.js"></script> 
    <script src="popup.js"></script>
</body>
</html>
